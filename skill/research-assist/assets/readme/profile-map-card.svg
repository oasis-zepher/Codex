  <text x="138" y="372" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Collections sketch the shape.</text>
  <text x="138" y="408" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Key papers supply the real color.</text>
  <text x="138" y="444" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Nearby items connect the map.</text>

