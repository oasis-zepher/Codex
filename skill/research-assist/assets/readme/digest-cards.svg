<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1320" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF4E9"/>
      <stop offset="1" stop-color="#F1E2D2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D57557"/>
      <stop offset="1" stop-color="#E2A067"/>
    </linearGradient>
    <filter id="shadow" x="56" y="44" width="1288" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#9D7457" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="980" rx="44" fill="#F6ECDF"/>
  <g filter="url(#shadow)">
