    <text x="940" y="672" text-anchor="middle" fill="#704F3B" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Map 0.94</text>
    <rect x="1014" y="646" width="144" height="42" rx="21" fill="#E5C8AE"/>
    <text x="1086" y="672" text-anchor="middle" fill="#704F3B" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Zotero 0.89</text>
    <text x="730" y="744" fill="#5B493E" font-size="22" font-family="Arial, Helvetica, sans-serif">Nearest Zotero: Voyager, ReAct</text>
    <text x="730" y="790" fill="#5B493E" font-size="21" font-family="Arial, Helvetica, sans-serif">Fit and evidence stay visible at a glance.</text>
