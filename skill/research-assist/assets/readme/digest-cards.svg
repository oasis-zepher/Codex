  </g>

  <text x="138" y="146" fill="#8E583A" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.8">DIGEST VIEW</text>
  <text x="138" y="236" fill="#2F241D" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">A shortlist should scan fast</text>
  <text x="138" y="304" fill="#2F241D" font-size="60" font-family="Georgia, 'Times New Roman', serif" font-weight="700">and justify itself.</text>

  <rect x="138" y="372" width="252" height="126" rx="24" fill="#FFF8EF" stroke="#E2CFBB" stroke-width="2"/>
  <text x="172" y="410" fill="#8C7564" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700">SELECTED</text>
  <text x="172" y="458" fill="#2F241D" font-size="48" font-family="Georgia, 'Times New Roman', serif" font-weight="700">5</text>
  <text x="172" y="482" fill="#5B493E" font-size="19" font-family="Arial, Helvetica, sans-serif">final papers kept</text>

  <rect x="410" y="372" width="252" height="126" rx="24" fill="#FCEFE2" stroke="#E2CFBB" stroke-width="2"/>
  <text x="444" y="410" fill="#8C7564" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700">READ FIRST</text>
  <text x="444" y="458" fill="#2F241D" font-size="48" font-family="Georgia, 'Times New Roman', serif" font-weight="700">3</text>
  <text x="444" y="482" fill="#5B493E" font-size="19" font-family="Arial, Helvetica, sans-serif">urgent starting points</text>

  <rect x="682" y="372" width="252" height="126" rx="24" fill="#F7E8DA" stroke="#E2CFBB" stroke-width="2"/>
  <text x="716" y="410" fill="#8C7564" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700">THEMES</text>
  <text x="716" y="458" fill="#2F241D" font-size="48" font-family="Georgia, 'Times New Roman', serif" font-weight="700">4</text>
  <text x="716" y="482" fill="#5B493E" font-size="19" font-family="Arial, Helvetica, sans-serif">branches touched</text>

  <rect x="954" y="372" width="252" height="126" rx="24" fill="#F2E2D2" stroke="#E2CFBB" stroke-width="2"/>
  <text x="988" y="410" fill="#8C7564" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700">DELIVERY</text>
  <text x="988" y="458" fill="#2F241D" font-size="40" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Email</text>
  <text x="988" y="482" fill="#5B493E" font-size="19" font-family="Arial, Helvetica, sans-serif">telegram optional</text>

  <g>
    <rect x="138" y="560" width="528" height="248" rx="30" fill="#FFF9F2" stroke="#E2CFBB" stroke-width="2"/>
    <rect x="174" y="598" width="118" height="38" rx="19" fill="#EFD1B4"/>
    <text x="233" y="622" text-anchor="middle" fill="#7A4F36" font-size="15" font-family="Arial, Helvetica, sans-serif" font-weight="700">Read first</text>
    <text x="174" y="692" fill="#2F241D" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Generative Agents</text>
    <text x="174" y="746" fill="#5B493E" font-size="22" font-family="Arial, Helvetica, sans-serif">Useful when the active map cares about</text>
    <text x="174" y="778" fill="#5B493E" font-size="22" font-family="Arial, Helvetica, sans-serif">memory, social behavior, and agent simulation.</text>
  </g>

  <g>
    <rect x="694" y="560" width="528" height="248" rx="30" fill="#FFF8EF" stroke="#E2CFBB" stroke-width="2"/>
    <text x="730" y="602" fill="#8A5437" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.5">VISIBLE SIGNALS</text>
    <rect x="730" y="646" width="136" height="42" rx="21" fill="url(#accent)"/>
    <text x="798" y="672" text-anchor="middle" fill="#FFF8F0" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Total 0.92</text>
