<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1320" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF6ED"/>
      <stop offset="1" stop-color="#F1E2D2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D78458"/>
      <stop offset="1" stop-color="#B85B45"/>
    </linearGradient>
    <filter id="shadow" x="56" y="44" width="1288" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#9A6E4F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="920" rx="44" fill="#F6ECDF"/>
  <g filter="url(#shadow)">
    <rect x="78" y="66" width="1244" height="776" rx="38" fill="url(#bg)"/>
  </g>

  <rect x="138" y="126" width="372" height="42" rx="21" fill="#EFD8C2"/>
  <text x="324" y="152" text-anchor="middle" fill="#7D4E36" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Skill for OpenClaw / Codex / Claude Code</text>

  <text x="138" y="250" fill="#2F241D" font-size="56" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Turn Zotero</text>
  <text x="138" y="314" fill="#2F241D" font-size="56" font-family="Georgia, 'Times New Roman', serif" font-weight="700">into a research map.</text>

  <text x="138" y="388" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Profile from evidence.</text>
  <text x="138" y="424" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Search arXiv against it.</text>
  <text x="138" y="460" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Keep only the sharpest papers.</text>
  <text x="138" y="496" fill="#5B493E" font-size="26" font-family="Arial, Helvetica, sans-serif">Feed the signal back into Zotero.</text>

  <rect x="138" y="598" width="184" height="58" rx="29" fill="url(#accent)"/>
  <text x="230" y="635" text-anchor="middle" fill="#FFF8F0" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Profile-first</text>
  <rect x="340" y="598" width="176" height="58" rx="29" fill="#E8DAC8"/>
  <text x="428" y="635" text-anchor="middle" fill="#6A4C39" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">AI shortlist</text>
  <rect x="534" y="598" width="184" height="58" rx="29" fill="#E4D5C3"/>
  <text x="626" y="635" text-anchor="middle" fill="#6A4C39" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Feedback loop</text>

  <g>
    <rect x="850" y="214" width="346" height="174" rx="28" fill="#FFF9F2" stroke="#E2CFBB" stroke-width="2"/>
    <text x="886" y="254" fill="#8A5437" font-size="14" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="1.5">PROFILE CARD</text>
    <rect x="886" y="280" width="120" height="36" rx="18" fill="#EEDCC8"/>
    <text x="946" y="303" text-anchor="middle" fill="#6A4C39" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Agents</text>
    <rect x="1018" y="280" width="102" height="36" rx="18" fill="#E7CCB3"/>
    <text x="1069" y="303" text-anchor="middle" fill="#6A4C39" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Worlds</text>
    <rect x="886" y="330" width="228" height="36" rx="18" fill="#F2E6D7"/>
    <text x="1000" y="353" text-anchor="middle" fill="#6A4C39" font-size="17" font-family="Arial, Helvetica, sans-serif" font-weight="700">Multi-agent planning</text>
  </g>

  <g>
    <rect x="804" y="434" width="424" height="332" rx="30" fill="#FFF8EF" stroke="#E2CFBB" stroke-width="2"/>
    <rect x="840" y="470" width="126" height="40" rx="20" fill="#EFD1B4"/>
    <text x="903" y="495" text-anchor="middle" fill="#7A4F36" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700">Read first</text>
    <text x="840" y="566" fill="#2F241D" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Voyager</text>
    <text x="840" y="610" fill="#2F241D" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Embodied agents</text>
    <text x="840" y="654" fill="#2F241D" font-size="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700">with LLMs</text>
    <text x="840" y="718" fill="#5B493E" font-size="20" font-family="Arial, Helvetica, sans-serif">A strong anchor for memory,</text>
    <text x="840" y="746" fill="#5B493E" font-size="20" font-family="Arial, Helvetica, sans-serif">tool use, and long horizons.</text>
  </g>
</svg>
